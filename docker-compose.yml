services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_PORT}:9000'   # S3 API — needed for presigned URL access
      - '127.0.0.1:9001:9001'  # MinIO console — localhost only, use SSH tunnel
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_PUBLIC_HOST=${MINIO_PUBLIC_HOST}
      - MINIO_PUBLIC_PORT=${MINIO_PUBLIC_PORT}
      - MINIO_PUBLIC_PROTOCOL=${MINIO_PUBLIC_PROTOCOL}
      - NODE_ENV=${NODE_ENV}
      - PORT=${BACKEND_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_TIMEOUT=${OPENAI_TIMEOUT}
      - LOG_LEVEL=${LOG_LEVEL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    image: node:20-alpine
    working_dir: /workspace/packages/frontend
    environment:
      - CI=true
      - PNPM_HOME=/pnpm
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm
    command: sh -c "corepack enable && pnpm install --filter frontend --ignore-scripts --no-frozen-lockfile && pnpm --filter frontend run build && pnpm --filter frontend run preview --host 0.0.0.0"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: apoj-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apoj.rule=Host(`apoj.samolit.com`)"
      - "traefik.http.routers.apoj.entrypoints=websecure"
      - "traefik.http.routers.apoj.tls.certresolver=le"
      - "traefik.http.services.apoj.loadbalancer.server.port=80"
    networks:
      - default
      - traefik
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

networks:
  default: {}
  traefik:
    external: true

volumes:
  postgres_data:
  minio_data:
  pnpm-store:
